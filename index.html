<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Dashboard</title>
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#e0a000">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#e0a000">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Dashboard">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 40rem; margin: 2rem auto; padding: 0 1rem; color: #222; }
    .reminders { padding: 1rem 1.25rem; border: 1px solid #e0a000; background: #fffbe6; border-radius: 4px; }
    .reminders ul { list-style: none; padding: 0; margin: 0; }
    .reminders li { padding: 0.5rem 0; display: flex; align-items: center; gap: 0.75rem; }
    .reminders label { cursor: pointer; font-size: 2.5em; font-weight: bold; display: inline-flex; align-items: center; }
    .reminders input { width: 1.1em; height: 1.1em; margin-right: 0.5rem; flex-shrink: 0; }
    .reminder-time { margin-left: auto; color: #888; font-size: 0.85rem; font-variant-numeric: tabular-nums; }
    .empty-state { color: #888; font-style: italic; }
    .hidden { display: none; }

    .settings-btn {
      position: fixed; top: 1rem; right: 1rem;
      width: 2.5rem; height: 2.5rem; border-radius: 50%;
      border: 1px solid #e0a000; background: #fffbe6; color: #8a6500;
      display: inline-flex; align-items: center; justify-content: center;
      text-decoration: none; padding: 0;
    }
    .settings-btn:hover { background: #fff3bf; }
    .settings-btn svg { width: 1.25rem; height: 1.25rem; }
  </style>
</head>
<body>
  <a id="settings-btn" class="settings-btn" href="settings.html" aria-label="Settings" title="Settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"></circle>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
    </svg>
  </a>

  <div id="reminders" class="reminders hidden">
    <ul id="reminder-list"></ul>
  </div>
  <p id="empty-state" class="empty-state">No reminders right now.</p>

  <script>
    const STORAGE_PREFIX = 'reminder-dismissed:';
    const TIMES_KEY = 'medication-reminder-times';
    const DEFAULT_TIMES = ['08:30', '20:30'];

    function loadTimes() {
      try {
        const raw = localStorage.getItem(TIMES_KEY);
        if (raw === null) return DEFAULT_TIMES.slice();
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed)) return parsed.filter(t => /^\d{2}:\d{2}$/.test(t));
      } catch (e) {}
      return DEFAULT_TIMES.slice();
    }

    function schedules() {
      return loadTimes().map(t => {
        const [h, m] = t.split(':').map(Number);
        return { id: `medication-${t}`, hour: h, minute: m, label: 'Take medication' };
      });
    }

    function lastDueTime(now, hour, minute) {
      const t = new Date(now);
      t.setHours(hour, minute, 0, 0);
      if (t.getTime() > now.getTime()) t.setDate(t.getDate() - 1);
      return t.getTime();
    }

    function activeReminders() {
      const now = new Date();
      return schedules()
        .map(s => ({ ...s, due: lastDueTime(now, s.hour, s.minute) }))
        .filter(s => {
          const dismissed = parseInt(localStorage.getItem(STORAGE_PREFIX + s.id) || '0', 10);
          return dismissed < s.due;
        });
    }

    function dismiss(id) {
      localStorage.setItem(STORAGE_PREFIX + id, Date.now().toString());
      render();
    }

    function render() {
      const active = activeReminders();
      const box = document.getElementById('reminders');
      const list = document.getElementById('reminder-list');
      const empty = document.getElementById('empty-state');
      list.innerHTML = '';
      if (active.length === 0) {
        box.classList.add('hidden');
        empty.classList.remove('hidden');
        return;
      }
      box.classList.remove('hidden');
      empty.classList.add('hidden');
      active.forEach(r => {
        const li = document.createElement('li');
        const label = document.createElement('label');
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.addEventListener('change', () => dismiss(r.id));
        label.appendChild(cb);
        label.appendChild(document.createTextNode(r.label));
        li.appendChild(label);
        const time = document.createElement('span');
        time.className = 'reminder-time';
        const d = new Date(r.due);
        const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        const dateStr = `${days[d.getDay()]} ${months[d.getMonth()]} ${d.getDate()}`;
        const timeStr = `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
        time.textContent = `${dateStr} · ${timeStr}`;
        li.appendChild(time);
        list.appendChild(li);
      });
    }

    render();
    setInterval(render, 30 * 1000);

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => console.error('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
