<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Dashboard</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 40rem; margin: 2rem auto; padding: 0 1rem; color: #222; }
    h1 { margin: 0 0 1.5rem; }
    .reminders { padding: 0.75rem 1rem; border: 1px solid #e0a000; background: #fffbe6; border-radius: 4px; }
    .reminders strong { display: block; margin-bottom: 0.25rem; }
    .reminders ul { list-style: none; padding: 0; margin: 0; }
    .reminders li { padding: 0.25rem 0; display: flex; align-items: center; }
    .reminders label { cursor: pointer; }
    .reminders input { margin-right: 0.4rem; transform: translateY(1px); }
    .reminder-time { margin-left: auto; color: #888; font-size: 0.85em; font-variant-numeric: tabular-nums; }
    .empty-state { color: #888; font-style: italic; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <h1>Personal Dashboard</h1>

  <div id="reminders" class="reminders hidden">
    <strong>Reminders</strong>
    <ul id="reminder-list"></ul>
  </div>
  <p id="empty-state" class="empty-state">No reminders right now.</p>

  <script>
    const SCHEDULES = [
      { id: 'medication-am', hour: 8,  minute: 30, label: 'Take medication' },
      { id: 'medication-pm', hour: 20, minute: 30, label: 'Take medication' }
    ];
    const STORAGE_PREFIX = 'reminder-dismissed:';

    function lastDueTime(now, hour, minute) {
      const t = new Date(now);
      t.setHours(hour, minute, 0, 0);
      if (t.getTime() > now.getTime()) t.setDate(t.getDate() - 1);
      return t.getTime();
    }

    function activeReminders() {
      const now = new Date();
      return SCHEDULES
        .map(s => ({ ...s, due: lastDueTime(now, s.hour, s.minute) }))
        .filter(s => {
          const dismissed = parseInt(localStorage.getItem(STORAGE_PREFIX + s.id) || '0', 10);
          return dismissed < s.due;
        });
    }

    function dismiss(id) {
      localStorage.setItem(STORAGE_PREFIX + id, Date.now().toString());
      render();
    }

    function render() {
      const active = activeReminders();
      const box = document.getElementById('reminders');
      const list = document.getElementById('reminder-list');
      const empty = document.getElementById('empty-state');
      list.innerHTML = '';
      if (active.length === 0) {
        box.classList.add('hidden');
        empty.classList.remove('hidden');
        return;
      }
      box.classList.remove('hidden');
      empty.classList.add('hidden');
      active.forEach(r => {
        const li = document.createElement('li');
        const label = document.createElement('label');
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.addEventListener('change', () => dismiss(r.id));
        label.appendChild(cb);
        label.appendChild(document.createTextNode(r.label));
        li.appendChild(label);
        const time = document.createElement('span');
        time.className = 'reminder-time';
        const d = new Date(r.due);
        const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        const dateStr = `${days[d.getDay()]} ${months[d.getMonth()]} ${d.getDate()}`;
        const timeStr = `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
        time.textContent = `${dateStr} · ${timeStr}`;
        li.appendChild(time);
        list.appendChild(li);
      });
    }

    render();
    setInterval(render, 30 * 1000);
  </script>
</body>
</html>
