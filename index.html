<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Dashboard</title>
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#e0a000">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#e0a000">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Dashboard">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 40rem; margin: 2rem auto; padding: 0 1rem; color: #222; }
    .reminders { padding: 1rem 1.25rem; border: 1px solid #e0a000; background: #fffbe6; border-radius: 4px; }
    .reminders ul { list-style: none; padding: 0; margin: 0; }
    .reminders li { padding: 0.5rem 0; display: flex; align-items: center; gap: 0.75rem; }
    .reminders label { cursor: pointer; font-size: 2.5em; font-weight: bold; display: inline-flex; align-items: center; }
    .reminders input { width: 1.1em; height: 1.1em; margin-right: 0.5rem; flex-shrink: 0; }
    .reminder-time { margin-left: auto; color: #888; font-size: 0.85rem; font-variant-numeric: tabular-nums; }
    .empty-state { color: #888; font-style: italic; }
    .hidden { display: none; }

    .settings-btn {
      position: fixed; top: 1rem; right: 1rem;
      width: 2.5rem; height: 2.5rem; border-radius: 50%;
      border: 1px solid #e0a000; background: #fffbe6; color: #8a6500;
      display: inline-flex; align-items: center; justify-content: center;
      cursor: pointer; padding: 0;
    }
    .settings-btn:hover { background: #fff3bf; }
    .settings-btn svg { width: 1.25rem; height: 1.25rem; }

    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      display: flex; align-items: center; justify-content: center;
      padding: 1rem; z-index: 10;
    }
    .modal {
      background: #fff; border-radius: 6px; padding: 1.25rem 1.5rem;
      width: 100%; max-width: 22rem; box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }
    .modal h2 { margin: 0 0 0.75rem; font-size: 1.1rem; }
    .modal p.hint { margin: 0 0 1rem; color: #666; font-size: 0.85rem; }
    .time-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
    .time-row input[type=time] { font-size: 1rem; padding: 0.35rem 0.5rem; flex: 1; }
    .time-row button {
      background: none; border: 1px solid #ccc; color: #666;
      width: 2rem; height: 2rem; border-radius: 4px; cursor: pointer;
      font-size: 1.1rem; line-height: 1; padding: 0;
    }
    .time-row button:hover { background: #f5f5f5; color: #c00; border-color: #c00; }
    .modal-actions { display: flex; justify-content: space-between; gap: 0.5rem; margin-top: 1rem; }
    .modal-actions button {
      padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; font-size: 0.95rem;
    }
    .btn-add { border: 1px dashed #e0a000; background: #fffbe6; color: #8a6500; }
    .btn-add:hover { background: #fff3bf; }
    .btn-done { border: 1px solid #e0a000; background: #e0a000; color: #fff; margin-left: auto; }
    .btn-done:hover { background: #c89000; }
    .btn-refresh { border: 1px solid #ccc; background: #fff; color: #444; width: 100%; margin-top: 0.75rem; }
    .btn-refresh:hover { background: #f5f5f5; }
  </style>
</head>
<body>
  <button id="settings-btn" class="settings-btn" aria-label="Settings" title="Settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"></circle>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
    </svg>
  </button>

  <div id="reminders" class="reminders hidden">
    <ul id="reminder-list"></ul>
  </div>
  <p id="empty-state" class="empty-state">No reminders right now.</p>

  <div id="settings-modal" class="modal-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="settings-title">
    <div class="modal">
      <h2 id="settings-title">Medication reminder times</h2>
      <p class="hint">Add one or more times. A reminder will appear each day after each time.</p>
      <div id="time-rows"></div>
      <div class="modal-actions">
        <button type="button" id="add-time" class="btn-add">+ Add time</button>
        <button type="button" id="done" class="btn-done">Done</button>
      </div>
      <button type="button" id="force-refresh" class="btn-refresh">Force refresh (clear cache)</button>
    </div>
  </div>

  <script>
    const STORAGE_PREFIX = 'reminder-dismissed:';
    const TIMES_KEY = 'medication-reminder-times';
    const DEFAULT_TIMES = ['08:30', '20:30'];

    function loadTimes() {
      try {
        const raw = localStorage.getItem(TIMES_KEY);
        if (raw === null) return DEFAULT_TIMES.slice();
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed)) return parsed.filter(t => /^\d{2}:\d{2}$/.test(t));
      } catch (e) {}
      return DEFAULT_TIMES.slice();
    }

    function saveTimes(times) {
      const cleaned = times.filter(t => /^\d{2}:\d{2}$/.test(t));
      cleaned.sort();
      localStorage.setItem(TIMES_KEY, JSON.stringify(cleaned));
    }

    function schedules() {
      return loadTimes().map(t => {
        const [h, m] = t.split(':').map(Number);
        return { id: `medication-${t}`, hour: h, minute: m, label: 'Take medication' };
      });
    }

    function lastDueTime(now, hour, minute) {
      const t = new Date(now);
      t.setHours(hour, minute, 0, 0);
      if (t.getTime() > now.getTime()) t.setDate(t.getDate() - 1);
      return t.getTime();
    }

    function activeReminders() {
      const now = new Date();
      return schedules()
        .map(s => ({ ...s, due: lastDueTime(now, s.hour, s.minute) }))
        .filter(s => {
          const dismissed = parseInt(localStorage.getItem(STORAGE_PREFIX + s.id) || '0', 10);
          return dismissed < s.due;
        });
    }

    function dismiss(id) {
      localStorage.setItem(STORAGE_PREFIX + id, Date.now().toString());
      render();
    }

    function render() {
      const active = activeReminders();
      const box = document.getElementById('reminders');
      const list = document.getElementById('reminder-list');
      const empty = document.getElementById('empty-state');
      list.innerHTML = '';
      if (active.length === 0) {
        box.classList.add('hidden');
        empty.classList.remove('hidden');
        return;
      }
      box.classList.remove('hidden');
      empty.classList.add('hidden');
      active.forEach(r => {
        const li = document.createElement('li');
        const label = document.createElement('label');
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.addEventListener('change', () => dismiss(r.id));
        label.appendChild(cb);
        label.appendChild(document.createTextNode(r.label));
        li.appendChild(label);
        const time = document.createElement('span');
        time.className = 'reminder-time';
        const d = new Date(r.due);
        const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        const dateStr = `${days[d.getDay()]} ${months[d.getMonth()]} ${d.getDate()}`;
        const timeStr = `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
        time.textContent = `${dateStr} · ${timeStr}`;
        li.appendChild(time);
        list.appendChild(li);
      });
    }

    function renderTimeRows() {
      const container = document.getElementById('time-rows');
      container.innerHTML = '';
      const times = loadTimes();
      if (times.length === 0) addTimeRow('08:00');
      else times.forEach(t => addTimeRow(t));
    }

    function addTimeRow(value) {
      const container = document.getElementById('time-rows');
      const row = document.createElement('div');
      row.className = 'time-row';
      const input = document.createElement('input');
      input.type = 'time';
      input.value = value;
      input.addEventListener('change', commitRows);
      const remove = document.createElement('button');
      remove.type = 'button';
      remove.setAttribute('aria-label', 'Remove time');
      remove.title = 'Remove';
      remove.textContent = '×';
      remove.addEventListener('click', () => {
        row.remove();
        commitRows();
      });
      row.appendChild(input);
      row.appendChild(remove);
      container.appendChild(row);
    }

    function commitRows() {
      const inputs = document.querySelectorAll('#time-rows input[type=time]');
      const values = Array.from(inputs).map(i => i.value).filter(Boolean);
      saveTimes(values);
      render();
    }

    document.getElementById('settings-btn').addEventListener('click', () => {
      renderTimeRows();
      document.getElementById('settings-modal').classList.remove('hidden');
    });
    document.getElementById('add-time').addEventListener('click', () => {
      addTimeRow('12:00');
      commitRows();
    });
    document.getElementById('done').addEventListener('click', () => {
      commitRows();
      document.getElementById('settings-modal').classList.add('hidden');
    });
    document.getElementById('force-refresh').addEventListener('click', async (e) => {
      const btn = e.currentTarget;
      btn.disabled = true;
      btn.textContent = 'Refreshing…';
      try {
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(r => r.unregister()));
        }
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map(k => caches.delete(k)));
        }
      } catch (err) {
        console.error('Force refresh failed:', err);
      }
      const url = new URL(window.location.href);
      url.searchParams.set('_', Date.now().toString());
      window.location.replace(url.toString());
    });
    document.getElementById('settings-modal').addEventListener('click', (e) => {
      if (e.target.id === 'settings-modal') {
        commitRows();
        document.getElementById('settings-modal').classList.add('hidden');
      }
    });

    render();
    setInterval(render, 30 * 1000);

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => console.error('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
