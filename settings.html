<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Settings</title>
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#e0a000">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="icon.svg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Settings">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 32rem; margin: 0 auto; padding: 1rem; color: #222; }
    header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem; padding-top: 0.5rem; }
    header a { color: #8a6500; text-decoration: none; font-size: 0.95rem; display: inline-flex; align-items: center; gap: 0.25rem; }
    header a:hover { text-decoration: underline; }
    header h1 { font-size: 1.25rem; margin: 0; }

    section { margin-bottom: 2rem; }
    section h2 { font-size: 1rem; margin: 0 0 0.25rem; }
    section p.hint { margin: 0 0 0.75rem; color: #666; font-size: 0.85rem; }

    .time-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
    .time-row input[type=time] { font-size: 1rem; padding: 0.4rem 0.5rem; flex: 1; }
    .time-row button {
      background: none; border: 1px solid #ccc; color: #666;
      width: 2.25rem; height: 2.25rem; border-radius: 4px; cursor: pointer;
      font-size: 1.2rem; line-height: 1; padding: 0;
    }
    .time-row button:hover { background: #f5f5f5; color: #c00; border-color: #c00; }

    .btn-add {
      border: 1px dashed #e0a000; background: #fffbe6; color: #8a6500;
      padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; font-size: 0.95rem; margin-top: 0.25rem;
    }
    .btn-add:hover { background: #fff3bf; }

    .btn-refresh {
      border: 1px solid #ccc; background: #fff; color: #444;
      padding: 0.6rem 1rem; border-radius: 4px; cursor: pointer; font-size: 0.95rem; width: 100%;
    }
    .btn-refresh:hover { background: #f5f5f5; }
    .btn-refresh:disabled { opacity: 0.6; cursor: default; }
  </style>
</head>
<body>
  <header>
    <a href="index.html" aria-label="Back to dashboard">&larr; Dashboard</a>
    <h1>Settings</h1>
  </header>

  <section>
    <h2>Medication reminder times</h2>
    <p class="hint">Add one or more times. A reminder will appear each day after each time.</p>
    <div id="time-rows"></div>
    <button type="button" id="add-time" class="btn-add">+ Add time</button>
  </section>

  <section>
    <h2>Cache</h2>
    <p class="hint">Use this if the dashboard hasn't picked up a recent update. Equivalent to a hard reload.</p>
    <button type="button" id="force-refresh" class="btn-refresh">Force refresh (clear cache)</button>
  </section>

  <script>
    const TIMES_KEY = 'medication-reminder-times';
    const DEFAULT_TIMES = ['08:30', '20:30'];

    function loadTimes() {
      try {
        const raw = localStorage.getItem(TIMES_KEY);
        if (raw === null) return DEFAULT_TIMES.slice();
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed)) return parsed.filter(t => /^\d{2}:\d{2}$/.test(t));
      } catch (e) {}
      return DEFAULT_TIMES.slice();
    }

    function saveTimes(times) {
      const cleaned = times.filter(t => /^\d{2}:\d{2}$/.test(t));
      cleaned.sort();
      localStorage.setItem(TIMES_KEY, JSON.stringify(cleaned));
    }

    function addTimeRow(value) {
      const container = document.getElementById('time-rows');
      const row = document.createElement('div');
      row.className = 'time-row';
      const input = document.createElement('input');
      input.type = 'time';
      input.value = value;
      input.addEventListener('change', commitRows);
      const remove = document.createElement('button');
      remove.type = 'button';
      remove.setAttribute('aria-label', 'Remove time');
      remove.title = 'Remove';
      remove.textContent = '×';
      remove.addEventListener('click', () => {
        row.remove();
        commitRows();
      });
      row.appendChild(input);
      row.appendChild(remove);
      container.appendChild(row);
    }

    function commitRows() {
      const inputs = document.querySelectorAll('#time-rows input[type=time]');
      const values = Array.from(inputs).map(i => i.value).filter(Boolean);
      saveTimes(values);
    }

    function renderTimeRows() {
      const container = document.getElementById('time-rows');
      container.innerHTML = '';
      const times = loadTimes();
      if (times.length === 0) addTimeRow('08:00');
      else times.forEach(t => addTimeRow(t));
    }

    document.getElementById('add-time').addEventListener('click', () => {
      addTimeRow('12:00');
      commitRows();
    });

    document.getElementById('force-refresh').addEventListener('click', async (e) => {
      const btn = e.currentTarget;
      btn.disabled = true;
      btn.textContent = 'Refreshing…';
      try {
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(r => r.unregister()));
        }
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map(k => caches.delete(k)));
        }
      } catch (err) {
        console.error('Force refresh failed:', err);
      }
      const url = new URL('index.html', window.location.href);
      url.searchParams.set('_', Date.now().toString());
      window.location.replace(url.toString());
    });

    renderTimeRows();
  </script>
</body>
</html>
